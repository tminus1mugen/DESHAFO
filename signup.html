<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Us — DESHAFO Integrated CBO</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:48px; }
    .pw-toggle { position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-light); }
  </style>
</head>
<body>

<!-- Minimal nav -->
<div class="navbar-wrapper">
  <nav class="navbar">
    <div class="nav-left"><a href="index.html">← Back to Home</a></div>
    <div class="nav-logo"><a href="index.html"><img src="assets/images/logo.png" alt="DESHAFO" /></a></div>
    <div class="nav-right"><a href="login.html">Sign In</a></div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </nav>
</div>

<div class="auth-page">
  <div class="auth-card">
    <img src="assets/images/logo.png" alt="DESHAFO" class="auth-logo" />
    <h2>Join DESHAFO</h2>
    <p class="auth-sub">Create your account and be part of the mission</p>

    <form>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Jane" required />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Achieng" required />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="07XX XXX XXX" />
      </div>
      <div class="form-group">
        <label>County / Location</label>
        <input type="text" placeholder="e.g. Homabay County" />
      </div>
      <div class="form-group">
        <label>How would you like to get involved?</label>
        <select>
          <option value="">Select...</option>
          <option>Volunteer</option>
          <option>Donor / Supporter</option>
          <option>Program Participant</option>
          <option>Community Partner</option>
          <option>Just staying informed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" placeholder="Create a strong password" required />
          <button type="button" class="pw-toggle"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" placeholder="Repeat your password" required />
          <button type="button" class="pw-toggle"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:flex;align-items:flex-start;gap:10px;font-size:0.88rem;color:var(--text-muted);cursor:pointer;line-height:1.5;">
          <input type="checkbox" style="width:auto;margin-top:3px;accent-color:var(--green);" required />
          I agree to DESHAFO's privacy policy and consent to receive updates about the organization's work.
        </label>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;font-size:1rem;">Create My Account →</button>
    </form>

    <div class="auth-divider"><span>already a member?</span></div>
    <p class="auth-switch">Already have an account? <a href="login.html">Sign in here →</a></p>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
