<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DESHAFO Integrated CBO</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:48px; }
    .pw-toggle { position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-light); }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .auth-card {
        padding: 32px 24px !important;
        max-width: 100% !important;
      }
    }
  </style>
</head>
<body>

<!-- Minimal nav -->
<div class="navbar-wrapper">
  <nav class="navbar">
    <div class="nav-left"><a href="index.html">← Back to Home</a></div>
    <div class="nav-logo"><a href="index.html"><img src="assets/images/logo.png" alt="DESHAFO" /></a></div>
    <div class="nav-right"><a href="signup.html">Create Account</a></div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </nav>
</div>

<div class="auth-page">
  <div class="auth-card">
    <img src="assets/images/logo.png" alt="DESHAFO" class="auth-logo" />
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your DESHAFO account</p>

    <form>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" placeholder="Your password" required />
          <button type="button" class="pw-toggle"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:0.88rem;cursor:pointer;color:var(--text-muted);">
          <input type="checkbox" style="width:auto;accent-color:var(--green);" /> Remember me
        </label>
        <a href="#" style="color:var(--green);font-size:0.88rem;font-weight:600;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <p class="auth-switch">Don't have an account? <a href="signup.html">Create one free →</a></p>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
